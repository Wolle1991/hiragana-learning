
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hiragana Trainer</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
</head>
<body>

<div class="app">
<h1>Hiragana Trainer</h1>

<div id="symbol">あ</div>

<div id="answers"></div>

<div id="result"></div>

<div class="stats">
<span>✅ <span id="correct">0</span></span>
<span>❌ <span id="wrong">0</span></span>
<span>🔥 <span id="streak">0</span></span>
</div>

<button id="next">Nächste Frage</button>

</div>

<script src="script.js"></script>
</body>
</html>
